apiVersion: bench.rune.ai/v1alpha1
kind: RuneBenchmark
metadata:
  name: sample-rune-benchmark
  namespace: default
spec:
  apiBaseUrl: "http://rune-api.default.svc.cluster.local:8080"
  workflow: agentic-agent
  question: "Why is the cluster degraded?"
  model: "llama3.1:8b"
  backendUrl: "http://ollama.default.svc.cluster.local:11434"
  backendWarmup: true
  backendWarmupTimeoutSeconds: 120
  kubeconfig: ""
  schedule: "*/15 * * * *"
  timeoutSeconds: 180
  backoffSeconds: 60
  suspend: false
  agent: "holmes"
  attestationRequired: false
