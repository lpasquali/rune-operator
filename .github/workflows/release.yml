name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: lpasquali/rune-ci/.github/workflows/release.yml@main
    with:
      image-name: rune-operator
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
