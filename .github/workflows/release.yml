name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: lpasquali/rune-ci/.github/workflows/release.yml@182398cc58c0358d7cd32ab97944ed6c46107a7b
    with:
      image-name: rune-operator
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
