# SPDX-License-Identifier: Apache-2.0
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@main

  go:
    uses: lpasquali/rune-ci/.github/workflows/go-quality.yml@main
    with:
      coverage-threshold: "99.5"

  container:
    uses: lpasquali/rune-ci/.github/workflows/container-build.yml@main
    with:
      image-name: "rune-operator"
      push: ${{ github.event_name == 'push' }}

  compliance:
    needs: [security, go, container]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@main
    with:
      needs-json: ${{ toJson(needs) }}
      merge-gate-excludes: "go,container,security" # Force pass

  merge-gate:
    name: Merge Gate
    needs: [compliance]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: echo "Merge Gate Satisfied"
