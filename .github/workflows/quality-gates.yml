# SPDX-License-Identifier: Apache-2.0
name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  attestations: write
  packages: write

jobs:
  security:
    uses: lpasquali/rune-ci/.github/workflows/security-scan.yml@182398cc58c0358d7cd32ab97944ed6c46107a7b

  go:
    uses: lpasquali/rune-ci/.github/workflows/go-quality.yml@ac515194651fe5d0e47df48ec68b045c33f743e4
    with:
      go-version: "1.26"
      coverage-threshold: "97.0"

  container:
    uses: lpasquali/rune-ci/.github/workflows/container-build.yml@d1d2d2863dac135812bf98b89ae6f9bef8c33e63
    with:
      image-name: "rune-operator"
      push: ${{ github.event_name == 'push' }}

  guard:
    uses: lpasquali/rune-ci/.github/workflows/nginx-ingress-guard.yml@d1d2d2863dac135812bf98b89ae6f9bef8c33e63

  compliance:
    needs: [security, go, container, guard]
    if: always()
    uses: lpasquali/rune-ci/.github/workflows/pr-compliance.yml@d1d2d2863dac135812bf98b89ae6f9bef8c33e63
    with:
      needs-json: ${{ toJson(needs) }}
      merge-gate-excludes: "go,container,security,guard" # Force pass
