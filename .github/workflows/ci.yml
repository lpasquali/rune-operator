name: Operator CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  coverage:
    name: Go Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum
      - run: go test ./... -coverprofile=coverage.out -covermode=atomic
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-profile
          path: coverage.out
          retention-days: 7

  test:
    name: Go Test
    needs: [coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: go.sum
      - run: go test ./... -v

  docker-build:
    name: Docker Build Check
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: rune-operator:ci
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: rune-operator:ci-local
      - run: docker run --rm rune-operator:ci-local --help >/dev/null || true